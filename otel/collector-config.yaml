receivers:
  otlp:
    protocols:
      grpc:
        endpoint: '0.0.0.0:4317'
      http:
        endpoint: '0.0.0.0:4318'
processors:
  batch:
  memory_limiter:
    check_interval: 5s
    limit_mib: 4096
    spike_limit_mib: 500
exporters:
  prometheus:
    endpoint: '0.0.0.0:8889'
  otlp/tempo:
    endpoint: 'tempo:4317'
    tls:
      insecure: true
  otlp/loki:
    endpoint: 'loki:3100'
    tls:
      insecure: true
service:
  pipelines:
    traces:
      receivers: ['otlp']
      processors: ['batch']
      exporters: ['otlp/tempo']
    metrics:
      receivers: ['otlp']
      processors: ['batch']
      exporters: ['prometheus']
    logs:
      receivers: ['otlp']
      processors: ['batch']
      exporters: ['otlp/loki']
